version: '3.8'

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - proshop-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/proshop
      - JWT_SECRET=your_jwt_secret_here
      - PAYPAL_CLIENT_ID=your_paypal_client_id_here
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/usr/src/app/uploads
    depends_on:
      - mongo
    networks:
      - proshop-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - proshop-network

volumes:
  mongo-data:

networks:
  proshop-network:
    driver: bridge
